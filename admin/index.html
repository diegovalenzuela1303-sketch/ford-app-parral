<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Ford Parral</title>
<link rel="stylesheet" href="../css/estilos.css">
</head>

<body>

<main class="admin-page">

<div class="container">

<h1>Panel de administración</h1>

<section id="loginBox">

<h3>Ingreso administrador</h3>

<form id="loginForm">

<input type="email" id="adminEmail" placeholder="Correo" required>

<input type="password" id="adminPassword" placeholder="Contraseña" required>

<button type="submit" class="btn btn-dark">Ingresar</button>

</form>

<div id="estadoLogin"></div>

</section>

<section id="panelBox" style="display:none;">

<div class="admin-top">

<button class="btn btn-dark" id="logoutBtn">
Cerrar sesión
</button>

</div>

<div class="stats-box">

<div>Prospectos totales: <b id="totalProspectos">0</b></div>

<div>Prospectos hoy: <b id="prospectosHoy">0</b></div>

<div>Vehículo más solicitado: <b id="vehiculoTop">-</b></div>

</div>

<table>

<thead>

<tr>
<th>Nombre</th>
<th>Teléfono</th>
<th>Vehículo</th>
<th>Comentario</th>
<th>Estado</th>
<th>Acciones</th>
</tr>

</thead>

<tbody id="tablaProspectos"></tbody>

</table>

</section>

</div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../config.js"></script>
<script src="../supabase-client.js"></script>
<script src="../js/admin.js"></script>

</body>
</html>
