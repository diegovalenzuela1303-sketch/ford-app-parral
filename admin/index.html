<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Ford Parral</title>
  <link rel="stylesheet" href="../css/estilos.css">
  <style>
    body {
      background: #071a36;
    }

    .hidden {
      display: none !important;
    }

    .login-shell {
      width: min(460px, calc(100% - 24px));
      margin: 80px auto;
      background: linear-gradient(180deg, rgba(8, 27, 58, 0.94), rgba(8, 20, 43, 0.98));
      border: 1px solid rgba(77, 132, 255, 0.18);
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.30);
      padding: 28px;
    }

    .login-shell h1 {
      margin: 0 0 10px;
      color: #fff;
      font-size: 2rem;
    }

    .login-shell p {
      margin: 0 0 18px;
      color: #d8e3f6;
      line-height: 1.6;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .login-form input {
      width: 100%;
      min-height: 54px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 1rem;
      outline: none;
    }

    .login-form input:focus {
      border-color: rgba(59,130,246,0.45);
      box-shadow: 0 0 0 4px rgba(59,130,246,0.10);
    }

    .login-error {
      min-height: 22px;
      color: #fecaca;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .admin-wrap {
      width: min(1280px, calc(100% - 24px));
      margin: 32px auto;
    }

    .admin-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .admin-title {
      margin: 0;
      color: #fff;
      font-size: 2rem;
      font-weight: 800;
    }

    .admin-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .admin-btn {
      min-height: 46px;
      padding: 0 18px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .admin-btn:hover {
      background: rgba(255,255,255,0.12);
    }

    .admin-btn-primary {
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      border: none;
    }

    .admin-btn-danger {
      background: rgba(239, 68, 68, 0.16);
      border-color: rgba(239, 68, 68, 0.25);
    }

    .admin-user {
      color: #cfe0ff;
      font-size: 0.92rem;
      font-weight: 700;
      margin-top: 6px;
    }

    .admin-panel {
      background: linear-gradient(180deg, rgba(8, 27, 58, 0.94), rgba(8, 20, 43, 0.98));
      border: 1px solid rgba(77, 132, 255, 0.18);
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.30);
      overflow: hidden;
    }

    .admin-summary {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .summary-card {
      min-width: 180px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .summary-card span {
      display: block;
      color: #9fb2d0;
      font-size: 0.88rem;
      margin-bottom: 6px;
    }

    .summary-card strong {
      color: #fff;
      font-size: 1.25rem;
    }

    .admin-table-wrap {
      overflow-x: auto;
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1180px;
    }

    .admin-table th,
    .admin-table td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      color: #d8e3f6;
      vertical-align: top;
    }

    .admin-table th {
      color: #fff;
      font-size: 0.95rem;
      font-weight: 800;
      background: rgba(255,255,255,0.04);
    }

    .admin-table tr:hover td {
      background: rgba(255,255,255,0.03);
    }

    .empty-state {
      padding: 24px;
      color: #d8e3f6;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 800;
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    .pill-ok {
      background: rgba(34, 197, 94, 0.16);
      color: #bbf7d0;
      border: 1px solid rgba(34, 197, 94, 0.22);
    }

    .pill-pending {
      background: rgba(245, 158, 11, 0.16);
      color: #fde68a;
      border: 1px solid rgba(245, 158, 11, 0.22);
    }

    .admin-link {
      color: #93c5fd;
      font-weight: 700;
    }

    .admin-link:hover {
      color: #bfdbfe;
    }

    .comment-cell {
      max-width: 260px;
      white-space: pre-wrap;
      line-height: 1.45;
    }

    .row-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .row-btn {
      min-height: 36px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-size: 0.84rem;
      font-weight: 800;
      cursor: pointer;
    }

    .row-btn:hover {
      background: rgba(255,255,255,0.12);
    }

    .row-btn-success {
      background: rgba(34, 197, 94, 0.16);
      border-color: rgba(34, 197, 94, 0.22);
      color: #bbf7d0;
    }

    .row-btn-delete {
      background: rgba(239, 68, 68, 0.16);
      border-color: rgba(239, 68, 68, 0.22);
      color: #fecaca;
    }

    @media (max-width: 640px) {
      .admin-title {
        font-size: 1.6rem;
      }

      .admin-actions {
        width: 100%;
      }

      .admin-btn {
        width: 100%;
      }

      .login-shell {
        margin-top: 40px;
      }
    }
  </style>
</head>
<body>
  <div id="loginView" class="login-shell hidden">
    <h1>Acceso admin</h1>
    <p>Ingresa con tu correo y contraseña de Supabase para ver los prospectos.</p>

    <form id="loginForm" class="login-form">
      <input
        type="email"
        id="adminEmail"
        placeholder="Correo"
        autocomplete="username"
        required
      >
      <input
        type="password"
        id="adminPassword"
        placeholder="Contraseña"
        autocomplete="current-password"
        required
      >
      <button type="submit" class="admin-btn admin-btn-primary">Iniciar sesión</button>
      <div id="loginError" class="login-error"></div>
    </form>
  </div>

  <div id="adminView" class="hidden">
    <div class="admin-wrap">
      <div class="admin-topbar">
        <div>
          <h1 class="admin-title">Prospectos Ford Parral</h1>
          <div id="adminUser" class="admin-user">—</div>
        </div>

        <div class="admin-actions">
          <button id="btnRecargar" class="admin-btn">Recargar</button>
          <button id="btnDescargarCSV" class="admin-btn admin-btn-primary">Descargar CSV</button>
          <button id="btnCerrarSesion" class="admin-btn admin-btn-danger">Cerrar sesión</button>
        </div>
      </div>

      <div class="admin-panel">
        <div class="admin-summary">
          <div class="summary-card">
            <span>Total de prospectos</span>
            <strong id="totalProspectos">0</strong>
          </div>

          <div class="summary-card">
            <span>Último registro</span>
            <strong id="ultimoRegistro">—</strong>
          </div>
        </div>

        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Nombre</th>
                <th>Teléfono</th>
                <th>Vehículo</th>
                <th>Comentario</th>
                <th>Ciudad</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaProspectos"></tbody>
          </table>
        </div>

        <div id="emptyState" class="empty-state" style="display:none;">
          No hay prospectos guardados todavía.
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script>
  <script src="../supabase-client.js"></script>

  <script>
    const loginView = document.getElementById("loginView");
    const adminView = document.getElementById("adminView");
    const loginForm = document.getElementById("loginForm");
    const adminEmail = document.getElementById("adminEmail");
    const adminPassword = document.getElementById("adminPassword");
    const loginError = document.getElementById("loginError");

    const tablaProspectos = document.getElementById("tablaProspectos");
    const emptyState = document.getElementById("emptyState");
    const totalProspectos = document.getElementById("totalProspectos");
    const ultimoRegistro = document.getElementById("ultimoRegistro");
    const btnDescargarCSV = document.getElementById("btnDescargarCSV");
    const btnRecargar = document.getElementById("btnRecargar");
    const btnCerrarSesion = document.getElementById("btnCerrarSesion");
    const adminUser = document.getElementById("adminUser");

    let prospectosActuales = [];

    function mostrarLogin() {
      adminView.classList.add("hidden");
      loginView.classList.remove("hidden");
    }

    function mostrarAdmin(email) {
      loginView.classList.add("hidden");
      adminView.classList.remove("hidden");
      adminUser.textContent = email ? `Sesión activa: ${email}` : "Sesión activa";
    }

    function escaparCSV(valor) {
      const texto = String(valor ?? "").replace(/"/g, '""');
      return `"${texto}"`;
    }

    function formatearFecha(valor) {
      if (!valor) return "—";
      const fecha = new Date(valor);
      if (Number.isNaN(fecha.getTime())) return "—";
      return fecha.toLocaleString("es-MX");
    }

    function descargarCSV() {
      if (!prospectosActuales.length) return;

      const encabezados = [
        "Fecha",
        "Nombre",
        "Teléfono",
        "Vehículo",
        "Comentario",
        "Ciudad",
        "Contactado"
      ];

      const filas = prospectosActuales.map((p) => [
        formatearFecha(p.created_at),
        p.nombre || "",
        p.telefono || "",
        p.vehiculo || "",
        p.comentario || "",
        p.ciudad || "",
        p.contactado ? "Sí" : "No"
      ]);

      const contenido = [
        encabezados.map(escaparCSV).join(","),
        ...filas.map((fila) => fila.map(escaparCSV).join(","))
      ].join("\n");

      const blob = new Blob(["\ufeff" + contenido], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const enlace = document.createElement("a");
      const fecha = new Date().toISOString().slice(0, 10);

      enlace.href = url;
      enlace.download = `prospectos-ford-parral-${fecha}.csv`;
      document.body.appendChild(enlace);
      enlace.click();
      document.body.removeChild(enlace);
      URL.revokeObjectURL(url);
    }

    async function marcarContactado(id, valorActual) {
      try {
        const { error } = await window.db
          .from("prospectos")
          .update({ contactado: !valorActual })
          .eq("id", id);

        if (error) throw error;
        cargarProspectos();
      } catch (error) {
        console.error(error);
        alert("No se pudo actualizar el estado del prospecto.");
      }
    }

    async function eliminarProspecto(id) {
      const confirmar = window.confirm("¿Seguro que quieres eliminar este prospecto?");
      if (!confirmar) return;

      try {
        const { error } = await window.db
          .from("prospectos")
          .delete()
          .eq("id", id);

        if (error) throw error;
        cargarProspectos();
      } catch (error) {
        console.error(error);
        alert("No se pudo eliminar el prospecto.");
      }
    }

    function renderTabla(data) {
      prospectosActuales = data || [];
      tablaProspectos.innerHTML = "";

      totalProspectos.textContent = String(prospectosActuales.length);
      ultimoRegistro.textContent = prospectosActuales.length
        ? formatearFecha(prospectosActuales[0].created_at)
        : "—";

      if (!prospectosActuales.length) {
        emptyState.style.display = "block";
        return;
      }

      emptyState.style.display = "none";

      tablaProspectos.innerHTML = prospectosActuales.map((p) => `
        <tr>
          <td><span class="pill">${formatearFecha(p.created_at)}</span></td>
          <td>${p.nombre || "—"}</td>
          <td>
            ${p.telefono ? `<a class="admin-link" href="tel:${p.telefono}">${p.telefono}</a>` : "—"}
          </td>
          <td>${p.vehiculo || "—"}</td>
          <td class="comment-cell">${p.comentario || "—"}</td>
          <td>${p.ciudad || "—"}</td>
          <td>
            <span class="pill ${p.contactado ? "pill-ok" : "pill-pending"}">
              ${p.contactado ? "Revisado" : "Pendiente"}
            </span>
          </td>
          <td>
            <div class="row-actions">
              <button class="row-btn row-btn-success" onclick="marcarContactadoGlobal('${p.id}', ${p.contactado ? "true" : "false"})">
                ${p.contactado ? "Quitar revisión" : "Revisar"}
              </button>
              <button class="row-btn row-btn-delete" onclick="eliminarProspectoGlobal('${p.id}')">
                Eliminar
              </button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    async function cargarProspectos() {
      try {
        const { data, error } = await window.db
          .from("prospectos")
          .select("*")
          .order("created_at", { ascending: false });

        if (error) throw error;
        renderTabla(data || []);
      } catch (error) {
        console.error(error);
        tablaProspectos.innerHTML = "";
        emptyState.style.display = "block";
        emptyState.textContent = "No se pudieron cargar los prospectos. Revisa Supabase.";
      }
    }

    async function revisarSesion() {
      const { data, error } = await window.db.auth.getSession();

      if (error) {
        console.error(error);
        mostrarLogin();
        return;
      }

      const sesion = data?.session;
      if (!sesion) {
        mostrarLogin();
        return;
      }

      const email = sesion.user?.email || "";
      mostrarAdmin(email);
      cargarProspectos();
    }

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      loginError.textContent = "";

      const email = adminEmail.value.trim();
      const password = adminPassword.value;

      try {
        const { error } = await window.db.auth.signInWithPassword({
          email,
          password
        });

        if (error) throw error;

        mostrarAdmin(email);
        cargarProspectos();
      } catch (error) {
        console.error(error);
        loginError.textContent = "Correo o contraseña incorrectos.";
      }
    });

    btnDescargarCSV.addEventListener("click", descargarCSV);
    btnRecargar.addEventListener("click", cargarProspectos);

    btnCerrarSesion.addEventListener("click", async () => {
      await window.db.auth.signOut();
      loginForm.reset();
      mostrarLogin();
    });

    window.db.auth.onAuthStateChange((_event, session) => {
      if (session?.user?.email) {
        mostrarAdmin(session.user.email);
      } else {
        mostrarLogin();
      }
    });

    window.marcarContactadoGlobal = marcarContactado;
    window.eliminarProspectoGlobal = eliminarProspecto;

    revisarSesion();
  </script>
</body>
</html>
