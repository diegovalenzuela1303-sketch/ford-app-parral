<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Admin | Ford Parral</title>

<link rel="stylesheet" href="../css/estilos.css">

<style>

.admin-shell{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.admin-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.admin-title{
font-size:32px;
}

.admin-counter{
background:#0b3a75;
padding:10px 18px;
border-radius:20px;
font-weight:600;
}

.admin-filters{
margin-bottom:20px;
}

.admin-select{
padding:10px;
border-radius:8px;
border:none;
}

.admin-table{

width:100%;
border-collapse:collapse;
background:#0b1c35;
border-radius:10px;
overflow:hidden;

}

.admin-table th,
.admin-table td{

padding:12px 14px;
border-bottom:1px solid rgba(255,255,255,.08);

}

.admin-table th{
background:#112a4f;
text-align:left;
}

.admin-table tr:hover{
background:rgba(255,255,255,.05);
}

.btn-admin{

padding:6px 10px;
border-radius:6px;
border:none;
cursor:pointer;
font-size:12px;

}

.btn-wa{
background:#25D366;
color:#fff;
}

.btn-ok{
background:#22c55e;
color:#fff;
}

.estado-nuevo{
color:#5eead4;
font-weight:600;
}

.estado-contactado{
color:#94a3b8;
}

</style>

</head>

<body>

<div class="admin-shell">

<div class="admin-header">

<h1 class="admin-title">
Prospectos Ford Parral
</h1>

<div id="contador" class="admin-counter">
0 prospectos
</div>

</div>

<div class="admin-filters">

<select id="filtroVehiculo" class="admin-select">
<option value="">Todos los vehículos</option>
</select>

</div>

<table class="admin-table">

<thead>

<tr>
<th>Nombre</th>
<th>Teléfono</th>
<th>Vehículo</th>
<th>Comentario</th>
<th>Estado</th>
<th>Acciones</th>
<th>Fecha</th>
</tr>

</thead>

<tbody id="tablaProspectos"></tbody>

</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../config.js"></script>
<script src="../supabase-client.js"></script>

<script>

let prospectos = []

async function cargarProspectos(){

const tabla = document.getElementById("tablaProspectos")
const contador = document.getElementById("contador")

const { data, error } = await window.db
.from("prospectos")
.select("*")
.order("created_at",{ascending:false})

if(error){

tabla.innerHTML = "<tr><td colspan='7'>Error cargando prospectos</td></tr>"
return

}

prospectos = data

contador.innerText = data.length + " prospectos"

renderTabla(data)

llenarFiltro(data)

}

function llenarFiltro(data){

const filtro = document.getElementById("filtroVehiculo")

const vehiculos = [...new Set(data.map(p=>p.vehiculo))]

vehiculos.forEach(v=>{

const option = document.createElement("option")
option.value = v
option.textContent = v
filtro.appendChild(option)

})

}

function renderTabla(data){

const tabla = document.getElementById("tablaProspectos")

tabla.innerHTML = data.map(p=>`

<tr>

<td>${p.nombre}</td>

<td>
<a href="tel:${p.telefono}">
${p.telefono}
</a>
</td>

<td>${p.vehiculo}</td>

<td>${p.comentario || ""}</td>

<td>

<span class="${
p.contactado ? "estado-contactado" : "estado-nuevo"
}">

${p.contactado ? "Contactado" : "Nuevo"}

</span>

</td>

<td>

<button class="btn-admin btn-wa"
onclick="waCliente('${p.telefono}','${p.vehiculo}')">
WhatsApp
</button>

<button class="btn-admin btn-ok"
onclick="marcarContactado('${p.id}')">
OK
</button>

</td>

<td>${new Date(p.created_at).toLocaleString()}</td>

</tr>

`).join("")

}

function waCliente(telefono,vehiculo){

const mensaje = encodeURIComponent(
`Hola, recibí tu solicitud sobre ${vehiculo}. Te atiende Diego Valenzuela.`
)

window.open(`https://wa.me/52${telefono}?text=${mensaje}`)

}

async function marcarContactado(id){

await window.db
.from("prospectos")
.update({contactado:true})
.eq("id",id)

cargarProspectos()

}

document.getElementById("filtroVehiculo")
.addEventListener("change",function(){

const valor = this.value

if(!valor){
renderTabla(prospectos)
return
}

const filtrado = prospectos.filter(p=>p.vehiculo === valor)

renderTabla(filtrado)

})

cargarProspectos()

</script>

</body>
</html>
