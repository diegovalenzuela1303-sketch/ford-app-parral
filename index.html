<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Ford Parral</title>
  <link rel="stylesheet" href="../css/estilos.css">
  <style>
    body {
      background: #071a36;
    }

    .admin-wrap {
      width: min(1200px, calc(100% - 24px));
      margin: 32px auto;
    }

    .admin-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .admin-title {
      margin: 0;
      color: #fff;
      font-size: 2rem;
      font-weight: 800;
    }

    .admin-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .admin-btn {
      min-height: 46px;
      padding: 0 18px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .admin-btn:hover {
      background: rgba(255,255,255,0.12);
    }

    .admin-btn-primary {
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      border: none;
    }

    .admin-btn-primary:hover {
      transform: translateY(-1px);
    }

    .admin-panel {
      background: linear-gradient(180deg, rgba(8, 27, 58, 0.94), rgba(8, 20, 43, 0.98));
      border: 1px solid rgba(77, 132, 255, 0.18);
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.30);
      overflow: hidden;
    }

    .admin-summary {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .summary-card {
      min-width: 180px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .summary-card span {
      display: block;
      color: #9fb2d0;
      font-size: 0.88rem;
      margin-bottom: 6px;
    }

    .summary-card strong {
      color: #fff;
      font-size: 1.25rem;
    }

    .admin-table-wrap {
      overflow-x: auto;
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    .admin-table th,
    .admin-table td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      color: #d8e3f6;
      vertical-align: top;
    }

    .admin-table th {
      color: #fff;
      font-size: 0.95rem;
      font-weight: 800;
      background: rgba(255,255,255,0.04);
    }

    .admin-table tr:hover td {
      background: rgba(255,255,255,0.03);
    }

    .empty-state {
      padding: 24px;
      color: #d8e3f6;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 800;
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    .admin-link {
      color: #93c5fd;
      font-weight: 700;
    }

    .admin-link:hover {
      color: #bfdbfe;
    }

    .comment-cell {
      max-width: 260px;
      white-space: pre-wrap;
      line-height: 1.45;
    }

    @media (max-width: 640px) {
      .admin-title {
        font-size: 1.6rem;
      }

      .admin-actions {
        width: 100%;
      }

      .admin-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="admin-wrap">
    <div class="admin-topbar">
      <h1 class="admin-title">Prospectos Ford Parral</h1>

      <div class="admin-actions">
        <button id="btnRecargar" class="admin-btn">Recargar</button>
        <button id="btnDescargarCSV" class="admin-btn admin-btn-primary">Descargar CSV</button>
      </div>
    </div>

    <div class="admin-panel">
      <div class="admin-summary">
        <div class="summary-card">
          <span>Total de prospectos</span>
          <strong id="totalProspectos">0</strong>
        </div>

        <div class="summary-card">
          <span>Último registro</span>
          <strong id="ultimoRegistro">—</strong>
        </div>
      </div>

      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Nombre</th>
              <th>Teléfono</th>
              <th>Vehículo</th>
              <th>Comentario</th>
              <th>Ciudad</th>
            </tr>
          </thead>
          <tbody id="tablaProspectos"></tbody>
        </table>
      </div>

      <div id="emptyState" class="empty-state" style="display:none;">
        No hay prospectos guardados todavía.
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script>
  <script src="../supabase-client.js"></script>

  <script>
    const tablaProspectos = document.getElementById("tablaProspectos");
    const emptyState = document.getElementById("emptyState");
    const totalProspectos = document.getElementById("totalProspectos");
    const ultimoRegistro = document.getElementById("ultimoRegistro");
    const btnDescargarCSV = document.getElementById("btnDescargarCSV");
    const btnRecargar = document.getElementById("btnRecargar");

    let prospectosActuales = [];

    function escaparCSV(valor) {
      const texto = String(valor ?? "").replace(/"/g, '""');
      return `"${texto}"`;
    }

    function formatearFecha(valor) {
      if (!valor) return "—";
      const fecha = new Date(valor);
      if (Number.isNaN(fecha.getTime())) return "—";
      return fecha.toLocaleString("es-MX");
    }

    function descargarCSV() {
      if (!prospectosActuales.length) return;

      const encabezados = [
        "Fecha",
        "Nombre",
        "Teléfono",
        "Vehículo",
        "Comentario",
        "Ciudad"
      ];

      const filas = prospectosActuales.map((p) => [
        formatearFecha(p.created_at),
        p.nombre || "",
        p.telefono || "",
        p.vehiculo || "",
        p.comentario || "",
        p.ciudad || ""
      ]);

      const contenido = [
        encabezados.map(escaparCSV).join(","),
        ...filas.map((fila) => fila.map(escaparCSV).join(","))
      ].join("\n");

      const blob = new Blob(["\ufeff" + contenido], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const enlace = document.createElement("a");
      const fecha = new Date().toISOString().slice(0, 10);

      enlace.href = url;
      enlace.download = `prospectos-ford-parral-${fecha}.csv`;
      document.body.appendChild(enlace);
      enlace.click();
      document.body.removeChild(enlace);
      URL.revokeObjectURL(url);
    }

    function renderTabla(data) {
      prospectosActuales = data || [];
      tablaProspectos.innerHTML = "";

      totalProspectos.textContent = String(prospectosActuales.length);
      ultimoRegistro.textContent = prospectosActuales.length
        ? formatearFecha(prospectosActuales[0].created_at)
        : "—";

      if (!prospectosActuales.length) {
        emptyState.style.display = "block";
        return;
      }

      emptyState.style.display = "none";

      tablaProspectos.innerHTML = prospectosActuales.map((p) => `
        <tr>
          <td><span class="pill">${formatearFecha(p.created_at)}</span></td>
          <td>${p.nombre || "—"}</td>
          <td>
            ${p.telefono ? `<a class="admin-link" href="tel:${p.telefono}">${p.telefono}</a>` : "—"}
          </td>
          <td>${p.vehiculo || "—"}</td>
          <td class="comment-cell">${p.comentario || "—"}</td>
          <td>${p.ciudad || "—"}</td>
        </tr>
      `).join("");
    }

    async function cargarProspectos() {
      try {
        const { data, error } = await window.db
          .from("prospectos")
          .select("*")
          .order("created_at", { ascending: false });

        if (error) throw error;
        renderTabla(data || []);
      } catch (error) {
        console.error(error);
        tablaProspectos.innerHTML = "";
        emptyState.style.display = "block";
        emptyState.textContent = "No se pudieron cargar los prospectos. Revisa Supabase.";
      }
    }

    btnDescargarCSV.addEventListener("click", descargarCSV);
    btnRecargar.addEventListener("click", cargarProspectos);

    cargarProspectos();
  </script>
</body>
</html>
